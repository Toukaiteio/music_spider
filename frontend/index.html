<script>
    const ws = new WebSocket('ws://localhost:8765');

    ws.onmessage = function(event) {
        try {
            const data = JSON.parse(event.data);
            console.log(data);
        } catch (e) {
            console.error('Invalid JSON:', event.data);
        }
    };
</script>
